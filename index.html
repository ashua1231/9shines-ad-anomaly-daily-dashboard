  let mid = '';
  if(platform==='meta'){
    mid = `<div class="row"><span class="k">CPM</span><span class="v">${inr(c.cpm7)} ${dv(c.cpmdev,true)}</span></div>
    <div class="row"><span class="k">Purchases</span><span class="v">${c.purch7} ${dv(c.purchdev)}</span></div>
    <div class="row"><span class="k">CTR</span><span class="v">${c.ctr7.toFixed(2)}% ${dv(c.ctrdev)}</span></div>`;
  } else {
    mid = `<div class="row"><span class="k">Conversions</span><span class="v">${c.conv7} ${dv(c.convdev)}</span></div>
    <div class="row"><span class="k">CPA</span><span class="v">${inr(c.cpa7)} ${dv(c.cpadev,true)}</span></div>`;
  }
  return `<div class="card"><span class="acctpill">${c.account}</span><div class="hd"><div class="nm" style="font-size:14px">${c.name}</div><span class="rag ${c.rag}">${c.is_new?'NEW':c.rag.toUpperCase()}</span></div>${roasRow}${spendRow}${mid}</div>`;
}

const metaPane = `<div class="grid3">${D.meta_acct.map(acctCard).join('')}</div>
<div class="charts"><div class="chartbox"><h3>ROAS: 7d vs 30d baseline (by account)</h3><canvas id="mRoas"></canvas></div>
<div class="chartbox"><h3>CPM: 7d vs 30d baseline (&#8377;, by account)</h3><canvas id="mCpm"></canvas></div></div>
<div class="sec">Campaigns <span class="badge">${D.meta_camps.length}</span></div>
<div class="grid">${D.meta_camps.map(c=>campCard(c,'meta')).join('')}</div>`;

const googPane = `<div class="grid">${D.google_camps.map(c=>campCard(c,'google')).join('')}</div>
<div class="charts"><div class="chartbox"><h3>ROAS by campaign (7d)</h3><canvas id="gRoas"></canvas></div>
<div class="chartbox"><h3>CPA deviation vs baseline (%)</h3><canvas id="gCpa"></canvas></div></div>`;

function depCard(d){
  const cls = d.severity==='CRITICAL'?'crit':(d.severity==='INFO'?'info':'');
  return `<div class="dep ${cls}"><div class="t">${d.pattern} <span class="rag ${d.severity==='CRITICAL'?'red':(d.severity==='INFO'?'green':'amber')}">${d.severity}</span></div>
  <div class="e">${d.entity}</div><div class="d">${d.detail}</div></div>`;
}
function alertRow(a){
  return `<div class="al"><span class="sev ${a.sev}">${a.sev}</span><span style="flex:1">${a.entity}</span><span style="color:var(--mut)">${a.msg}</span></div>`;
}
const discPane = `<div class="sec">Compound Patterns / Dependencies <span class="badge">${D.deps.length}</span></div>
${D.deps.map(depCard).join('')}
<div class="sec">All Active Alerts <span class="badge">${D.alerts.length}</span></div>
<div class="alistwrap">${D.alerts.map(alertRow).join('')}</div>`;

const TABS=[
 {id:'meta',label:'Meta Ads',badge:D.meta_camps.length,html:metaPane},
 {id:'google',label:'Google Ads',badge:D.google_camps.length,html:googPane},
 {id:'disc',label:'Discrepancies & Dependencies',badge:D.deps.length,html:discPane},
];
document.getElementById('tabs').innerHTML=TABS.map((t,i)=>`<div class="tab ${i===0?'active':''}" data-t="${t.id}">${t.label}<span class="badge">${t.badge}</span></div>`).join('');
document.getElementById('panes').innerHTML=TABS.map((t,i)=>`<div class="pane ${i===0?'active':''}" id="p-${t.id}">${t.html}</div>`).join('');

let ch={};
function dMeta(){
  if(ch.m) return; ch.m=1;
  new Chart(mRoas,{type:'bar',data:{labels:D.meta_acct.map(m=>m.name),datasets:[
    {label:'7d',data:D.meta_acct.map(m=>m.roas7),backgroundColor:'#3b82f6'},
    {label:'30d baseline',data:D.meta_acct.map(m=>m.roas7/(1+(m.roasdev||0)/100)),backgroundColor:'#4b5563'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a97ad'}}},scales:{x:{ticks:{color:'#8a97ad',font:{size:10}}},y:{ticks:{color:'#8a97ad'}}}}});
  new Chart(mCpm,{type:'bar',data:{labels:D.meta_acct.map(m=>m.name),datasets:[
    {label:'7d',data:D.meta_acct.map(m=>m.cpm7),backgroundColor:'#fbbf24'},
    {label:'30d baseline',data:D.meta_acct.map(m=>m.cpm7/(1+(m.cpmdev||0)/100)),backgroundColor:'#4b5563'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a97ad'}}},scales:{x:{ticks:{color:'#8a97ad',font:{size:10}}},y:{ticks:{color:'#8a97ad'}}}}});
}
function dGoog(){
  if(ch.g) return; ch.g=1;
  const labels = D.google_camps.map(c=>c.name.length>18?c.name.slice(0,18)+'...':c.name);
  new Chart(gRoas,{type:'bar',data:{labels:labels,datasets:[{data:D.google_camps.map(c=>c.roas7),backgroundColor:D.google_camps.map(c=>c.rag==='red'?'#f87171':(c.rag==='amber'?'#fbbf24':'#34d399'))}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8a97ad',font:{size:9}}},y:{ticks:{color:'#8a97ad'}}}}});
  new Chart(gCpa,{type:'bar',data:{labels:labels,datasets:[{data:D.google_camps.map(c=>c.cpadev||0),backgroundColor:D.google_camps.map(c=>(c.cpadev||0)>30?'#f87171':'#3b82f6')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8a97ad',font:{size:9}}},y:{ticks:{color:'#8a97ad'}}}}});
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); document.getElementById('p-'+t.dataset.t).classList.add('active');
  if(t.dataset.t==='google') dGoog();
});
dMeta();
</script></body></html>
